<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>❤️</title>
</head>

<body style="background:#ff7eb3; text-align:center; font-family:Arial; color:white;">

<div id="inicio" style="margin-top:100px;">
  <h2>Oi, amor ❤️</h2>
  <p>Antes de abrir… lê com calma 💌</p>
  <button onclick="abrir()">Abrir</button>
</div>

<div id="carta" style="display:none; margin-top:100px;">
  <h2>Pra você ❤️</h2>
  <p>
  Foi tudo muito rápido…<br><br>
  mas nunca pareceu errado.<br><br>

  Eu descobri que não existe tempo pra amar alguém.<br><br>

  Mesmo com medo…<br>
  com você eu quero tentar.<br><br>

  Porque você me fez querer amar de novo ❤️
  </p>
</div>

<script>
function abrir(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("carta").style.display="block";
}
</script>

</body>
</html>
